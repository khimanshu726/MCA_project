services:
  - type: web
    name: elite-empressions
    runtime: node
    plan: free
    # `npm run build` builds BOTH the storefront and the admin app. It used to
    # build only the storefront, with `npm run build:admin` appended here — which
    # meant the admin app existed on a deploy only if this file was actually in
    # effect. It isn't, for a service created by hand rather than from a
    # Blueprint, and the admin app survived purely because a stale dist-admin was
    # committed to git. When that was removed, /admin 404'd. Building both from
    # one script makes the deploy correct regardless of the build command used.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

      # `sync: false` means Render prompts for the value instead of storing it
      # here, so these stay out of git while still being *declared*. Declaring
      # them is the point: an undeclared var that nobody set produces a green
      # deploy of a broken feature, which is exactly how payments shipped dead.
      - key: MONGO_URI
        sync: false

      # Server-side. Read at boot by config/razorpay.js; if either is missing
      # the Razorpay client is never constructed and online payments 503.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # Separate secret from the one above — Razorpay signs webhooks with the
      # value configured on the webhook itself, not with the API key secret.
      # Without it, payments succeed but orders stay in PaymentPending: the
      # webhook is what confirms them.
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # There is deliberately NO VITE_RAZORPAY_KEY_ID. The browser gets the
      # key id from the create-order response instead of a build-time inline,
      # so there is no second variable to forget and no way for the frontend
      # and backend keys to disagree. See orderController.js.

      # File storage. REQUIRED in production, not optional: Render's filesystem
      # is ephemeral, so without these the server falls back to local disk and
      # every product photo, studio asset, and customer's order artwork is
      # destroyed on the next redeploy. Uploads refuse with a 503 rather than
      # accept a file they cannot keep — check /api/health `uploads.durable`.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
